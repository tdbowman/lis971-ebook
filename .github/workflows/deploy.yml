name: deploy-book

on:
  push:
    branches:
      - main

permissions:
  pages: write
  id-token: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install MyST Markdown
        run: npm install -g mystmd

      - name: Build the book
        env:
          BASE_URL: /lis971-ebook
        run: myst build --html

      - name: Show build output
        run: |
          echo "=== _build directory ==="
          ls -la _build/ || echo "_build does not exist"
          echo "=== _build/html ==="
          ls -la _build/html/ 2>/dev/null || echo "_build/html does not exist"
          echo "=== _build/site ==="
          ls -la _build/site/ 2>/dev/null || echo "_build/site does not exist"
          echo "=== looking for index.html ==="
          find _build -name "index.html" 2>/dev/null || echo "no index.html found"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
